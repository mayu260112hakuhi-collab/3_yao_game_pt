<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>八百万駆動 - 新規企画作成</title>
    <link rel="stylesheet" href="new-project.css">
</head>
<body>
    <div class="new-project-container">
        <!-- ヘッダー -->
        <div class="project-header">
            <h1>新規企画作成</h1>
            <p>新しいプロジェクトを作成します</p>
        </div>

        <!-- フォーム -->
        <div class="project-form">
            <form id="create-project-form">
                <!-- 基本情報 -->
                <div class="form-section">
                    <div class="section-title">基本情報</div>
                    
                    <div class="form-group">
                        <label for="project-name">企画名 <span class="required">*</span></label>
                        <input type="text" id="project-name" name="name" placeholder="プロジェクト名を入力" required>
                    </div>

                    <div class="form-group">
                        <label for="project-version">バージョン <span class="required">*</span></label>
                        <input type="text" id="project-version" name="version" placeholder="例: 0.1.0" value="0.1.0" required>
                    </div>

                    <div class="form-group">
                        <label for="project-description">説明</label>
                        <textarea id="project-description" name="description" placeholder="プロジェクトの説明を入力"></textarea>
                    </div>
                </div>

                <!-- ディスプレイ設定 -->
                <div class="form-section">
                    <div class="section-title">ディスプレイ設定</div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="window-width">ウィンドウ幅 (ピクセル) <span class="required">*</span></label>
                            <input type="number" id="window-width" name="window_width" value="1280" min="320" required>
                        </div>

                        <div class="form-group">
                            <label for="window-height">ウィンドウ高さ (ピクセル) <span class="required">*</span></label>
                            <input type="number" id="window-height" name="window_height" value="720" min="240" required>
                        </div>
                    </div>

                    <div class="form-group checkbox">
                        <input type="checkbox" id="window-resizable" name="resizable" checked>
                        <label for="window-resizable">リサイズ可能</label>
                    </div>

                    <div class="form-group checkbox">
                        <input type="checkbox" id="window-fullscreen" name="fullscreen">
                        <label for="window-fullscreen">フルスクリーン</label>
                    </div>
                </div>

                <!-- レンダリング設定 -->
                <div class="form-section">
                    <div class="section-title">レンダリング設定</div>
                    
                    <div class="form-group">
                        <label for="target-fps">ターゲットFPS <span class="required">*</span></label>
                        <input type="number" id="target-fps" name="target_fps" value="60" min="1" max="240" required>
                    </div>

                    <div class="form-group checkbox">
                        <input type="checkbox" id="vsync" name="vsync" checked>
                        <label for="vsync">V-Sync を有効</label>
                    </div>
                </div>

                <!-- シーン設定 -->
                <div class="form-section">
                    <div class="section-title">シーン設定</div>
                    
                    <div class="form-group">
                        <label for="initial-scene">初期シーン</label>
                        <input type="text" id="initial-scene" name="initial_scene" placeholder="メインシーン等">
                    </div>
                </div>

                <!-- グリッド設定 -->
                <div class="form-section">
                    <div class="section-title">グリッド設定</div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="grid-base-size">基準サイズ</label>
                            <input type="number" id="grid-base-size" name="grid_base_size" value="1.0" min="0.1" step="0.1">
                        </div>

                        <div class="form-group">
                            <label for="grid-ratio">分割比率</label>
                            <input type="number" id="grid-ratio" name="grid_ratio" value="1.0" min="0.1" step="0.1">
                        </div>
                    </div>
                </div>

                <!-- デバッグ設定 -->
                <div class="form-section">
                    <div class="section-title">デバッグ設定</div>
                    
                    <div class="form-group checkbox">
                        <input type="checkbox" id="debug-enabled" name="debug_enabled" checked>
                        <label for="debug-enabled">デバッグを有効</label>
                    </div>
                </div>

                <!-- ボタン -->
                <div class="form-buttons">
                    <button type="button" id="cancel-btn" class="btn btn-secondary">キャンセル</button>
                    <button type="submit" class="btn btn-primary">作成</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="new-project.js"></script>
</body>
</html>
