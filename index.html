<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>八百万駆動 - ランチャー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: sans-serif;
            background: #2b2b2b;
            color: #ccc;
        }

        .launcher-container {
            display: grid;
            grid-template-columns: 1fr 250px;
            height: 100vh;
            gap: 0;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
            background: #252526;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #fff;
        }

        .project-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .project-card {
            background: #313335;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 100px;
            display: flex;
            flex-direction: column;
        }

        .project-card:hover {
            background: #3c3f41;
            border-color: #4b6eaf;
            box-shadow: 0 0 10px rgba(75, 110, 175, 0.3);
        }

        .project-card.selected {
            background: #4b6eaf;
            border-color: #6b8edf;
            color: white;
        }

        .project-card.selected .project-name {
            color: white;
        }

        .project-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #fff;
        }

        .project-description {
            font-size: 12px;
            color: #aaa;
            flex-grow: 1;
        }

        .sidebar {
            background: #313335;
            border-left: 1px solid #000;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .sidebar-title {
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }

        .sidebar-info {
            font-size: 12px;
            color: #aaa;
        }

        .sidebar-info-item {
            margin-bottom: 10px;
        }

        .sidebar-info-label {
            color: #999;
            font-size: 11px;
        }

        .sidebar-info-value {
            color: #ccc;
            font-size: 13px;
            margin-top: 3px;
        }

        .sidebar-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: auto;
        }

        .btn {
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            font-weight: bold;
        }

        .btn-edit {
            background: #4b6eaf;
            color: white;
        }

        .btn-edit:hover {
            background: #6b8edf;
        }

        .btn-edit:disabled {
            background: #666;
            cursor: not-allowed;
            color: #999;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }

        .error {
            background: #4d1a1a;
            border: 1px solid #8b3333;
            color: #ff9999;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="launcher-container">
        <div class="main-content">
            <div class="header">
                <h1>八百万駆動</h1>
                <p>プロジェクトを選択してエディタを起動してください</p>
            </div>
            <div id="error-message" class="error" style="display: none;"></div>
            <div id="projects-container" class="loading">
                プロジェクトを読み込み中...
            </div>
        </div>

        <div class="sidebar">
            <div class="sidebar-title">プロジェクト情報</div>
            <div id="project-info" class="sidebar-info">
                <div style="color: #999;">プロジェクトを選択してください</div>
            </div>
            <div class="sidebar-buttons">
                <button id="edit-btn" class="btn btn-edit" disabled>
                    エディタで開く
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { invoke } from '@tauri-apps/api/core';

        let projects = [];
        let selectedProject = null;

        async function loadProjects() {
            try {
                const basePath = "E:\\3_yg_v2";
                projects = await invoke('scan_projects', { basePath });
                displayProjects();
            } catch (error) {
                showError(`プロジェクトの読み込みに失敗しました: ${error}`);
                console.error(error);
            }
        }

        function displayProjects() {
            const container = document.getElementById('projects-container');
            
            if (projects.length === 0) {
                container.innerHTML = '<p style="color: #999;">利用可能なプロジェクトがありません</p>';
                return;
            }

            container.innerHTML = '';
            container.className = 'project-list';

            projects.forEach((project, index) => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.innerHTML = `
                    <div class="project-name">${project.name}</div>
                    <div class="project-description">${project.description}</div>
                `;
                
                card.addEventListener('click', () => selectProject(project, card));
                container.appendChild(card);
            });
        }

        function selectProject(project, cardElement) {
            document.querySelectorAll('.project-card').forEach(card => {
                card.classList.remove('selected');
            });

            selectedProject = project;
            cardElement.classList.add('selected');
            updateSidebar();
        }

        function updateSidebar() {
            const infoContainer = document.getElementById('project-info');
            const editBtn = document.getElementById('edit-btn');

            if (selectedProject) {
                infoContainer.innerHTML = `
                    <div class="sidebar-info-item">
                        <div class="sidebar-info-label">名前</div>
                        <div class="sidebar-info-value">${selectedProject.name}</div>
                    </div>
                    <div class="sidebar-info-item">
                        <div class="sidebar-info-label">パス</div>
                        <div class="sidebar-info-value" style="word-break: break-all; font-size: 11px;">
                            ${selectedProject.directory}
                        </div>
                    </div>
                    <div class="sidebar-info-item">
                        <div class="sidebar-info-label">説明</div>
                        <div class="sidebar-info-value">${selectedProject.description || '（なし）'}</div>
                    </div>
                `;
                editBtn.disabled = false;
            } else {
                infoContainer.innerHTML = '<div style="color: #999;">プロジェクトを選択してください</div>';
                editBtn.disabled = true;
            }
        }

        document.getElementById('edit-btn').addEventListener('click', async () => {
            if (selectedProject) {
                try {
                    localStorage.setItem('currentProjectName', selectedProject.name);
                    localStorage.setItem('currentProjectDirectory', selectedProject.directory);
                    
                    await invoke('open_project_in_editor_cmd', { path: selectedProject.directory });
                } catch (error) {
                    showError(`エディタの起動に失敗しました: ${error}`);
                    console.error(error);
                }
            }
        });

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        loadProjects();
    </script>
</body>
</html>
